<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drag Color Sort</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

<div class="topbar">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">5:00</span></div>
</div>

<div id="playArea"></div>

<div class="bins">

<div class="bin blue" data-color="blue">BLUE</div>
<div class="bin yellow" data-color="yellow">YELLOW</div>
<div class="bin red" data-color="red">RED</div>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
