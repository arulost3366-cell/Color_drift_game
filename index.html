<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drag Color Sort</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ui">
<div class="score">Score: <span id="score">0</span></div>
</div>

<div id="gameArea">

<div class="bins">

<div class="bin blue" data-color="blue">
<div class="label">BLUE</div>
</div>

<div class="bin yellow" data-color="yellow">
<div class="label">YELLOW</div>
</div>

<div class="bin red" data-color="red">
<div class="label">RED</div>
</div>

</div>

<div id="balls"></div>

</div>

<script src="game.js"></script>

</body>
</html>
